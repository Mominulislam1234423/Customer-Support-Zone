<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>Customer-Support-Zone</title>

  <!-- css link -->
  <link rel="stylesheet" href="Style/style.css">

  <!-- React CDN -->
  <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

  <!-- add tailwind & daisy ui -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />

  <!-- font-awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">

    const vector1 = "Assets/vector1.png";
    const vector2 = "Assets/vector2.png";



    // loded all json data 
    const ticketsData = [
      {
        "id": "#3001",
        "title": "Login Session Expired Automatically",
        "status": "Open",
        "priority": "High",
        "customerName": "Imran Hossain",
        "description": "User gets logged out automatically within a few minutes after login.",
        "date": "03/01/2026"
      },
      {
        "id": "#3002",
        "title": "Card Payment Declined",
        "status": "In-Progress",
        "priority": "High",
        "customerName": "Sumaiya Akter",
        "description": "Customer’s debit card payment was declined despite sufficient balance.",
        "date": "03/02/2026"
      },
      {
        "id": "#3003",
        "title": "Unable to Change Password",
        "status": "Open",
        "priority": "Medium",
        "customerName": "Rakib Hasan",
        "description": "User receives an unknown error while trying to change account password.",
        "date": "03/03/2026"
      },
      {
        "id": "#3004",
        "title": "Billing Address Not Updating",
        "status": "Open",
        "priority": "Low",
        "customerName": "Tania Sultana",
        "description": "Customer updated billing address but old address still appears.",
        "date": "03/04/2026"
      },
      {
        "id": "#3005",
        "title": "Mobile App Crash on Android",
        "status": "In-Progress",
        "priority": "High",
        "customerName": "Shakil Ahmed",
        "description": "App crashes immediately after launch on Android 13 devices.",
        "date": "03/05/2026"
      },
      {
        "id": "#3006",
        "title": "Refund Not Received",
        "status": "Open",
        "priority": "Medium",
        "customerName": "Nabila Rahman",
        "description": "Refund requested 7 days ago but not yet processed.",
        "date": "03/06/2026"
      },
      {
        "id": "#3007",
        "title": "OTP Not Sending",
        "status": "Open",
        "priority": "High",
        "customerName": "Fahim Chowdhury",
        "description": "Customer not receiving OTP for two-factor authentication.",
        "date": "03/07/2026"
      },
      {
        "id": "#3008",
        "title": "Subscription Renewal Failed",
        "status": "In-Progress",
        "priority": "Medium",
        "customerName": "Mahi Islam",
        "description": "Auto-renewal failed even though payment method is valid.",
        "date": "03/08/2026"
      },
      {
        "id": "#3009",
        "title": "Invoice Email Not Delivered",
        "status": "Open",
        "priority": "Low",
        "customerName": "Sabbir Khan",
        "description": "Customer did not receive invoice email after purchase.",
        "date": "03/09/2026"
      },
      {
        "id": "#3010",
        "title": "Profile Picture Upload Error",
        "status": "Open",
        "priority": "Low",
        "customerName": "Jannat Ara",
        "description": "User gets upload failed error while updating profile picture.",
        "date": "03/10/2026"
      },
      {
        "id": "#3011",
        "title": "Dashboard Data Not Loading",
        "status": "In-Progress",
        "priority": "High",
        "customerName": "Adnan Karim",
        "description": "Dashboard shows blank screen after login.",
        "date": "03/11/2026"
      },
      {
        "id": "#3012",
        "title": "Order Status Not Updating",
        "status": "Open",
        "priority": "Medium",
        "customerName": "Lamia Haque",
        "description": "Order status remains pending even after successful delivery.",
        "date": "03/12/2026"
      }
    ]


    function App() {
      const [ticket, setTicket] = React.useState([]);
      const [resolvedTickets, setResolvedTickets] = React.useState([]);
      React.useEffect(() => {
        setTicket(ticketsData);
      }, []);

      const [selectedTickets, setSelectedTickets] = React.useState([]);

      const handleSelectTicket = (t) => {
        setSelectedTickets([...selectedTickets, t]);
      };

      const handleCompleteTicket = (tickat) => {
        const remainingAllTickets = ticket.filter((t) => t.id !== tickat.id);
        setTicket(remainingAllTickets);

        const remainingSelected = selectedTickets.filter((t) => t.id !== tickat.id);
        setSelectedTickets(remainingSelected);

        setResolvedTickets([...resolvedTickets, tickat]);
      };

      return (
        <div>
          <Navbar></Navbar>
          <Banner
            resolvedTickets={resolvedTickets}
            selectedTickets={selectedTickets}></Banner>
          <Tickets
            ticket={ticket}
            handleCompleteTicket={handleCompleteTicket}
            handleSelectTicket={handleSelectTicket}
            selectedTickets={selectedTickets}
          ></Tickets>
          <Footer></Footer>
        </div>
      );

      // navbar section start
      function Navbar() {
        return (
          <div>
            <div className="navbar bg-base-100 shadow-sm w-11/12 mx-auto">
              <div className="navbar-start">
                <div className="dropdown">
                  <div tabindex="0" role="button" className="btn btn-ghost lg:hidden">
                    <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"> <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h8m-8 6h16" /> </svg>
                  </div>
                  <ul
                    tabindex="-1"
                    className="menu border-2 space-y-2 menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow">
                    <a href="#"><li>Home</li></a>
                    <a href="#"><li>FAQ</li></a>
                    <a href="#"><li>Changelog</li></a>
                    <a href="#"><li>Blog</li></a>
                    <a href="#"><li>Download</li></a>
                    <a href="#"><li>Contact</li></a>
                  </ul>
                </div>
                <a className="btn btn-ghost text-xl">CS — Ticket System</a>
              </div>

              <div className="navbar-end space-x-10">
                <div className="hidden lg:flex">
                  <ul className="menu menu-horizontal px-1 flex gap-5">
                    <a href="#"><li>Home</li></a>
                    <a href="#"><li>FAQ</li></a>
                    <a href="#"><li>Changelog</li></a>
                    <a href="#"><li>Blog</li></a>
                    <a href="#"><li>Download</li></a>
                    <a href="#"><li>Contact</li></a>
                  </ul>
                </div>
                <a className="border-2 py-2 px-4 bg-gradient-to-r from-[#632EE3] to-[#9F62F2] text-white">+ New Ticket</a>
              </div>
            </div>
          </div>
        )
      }
      // navbar section end


      // banner section start
      function Banner({ selectedTickets, resolvedTickets }) {
        return (
          <div className="w-11/12 mt-8 mx-auto grid gap-5 lg:grid-cols-2 md:grid-cols-2">
            <div
              className="relative w-full h-48 rounded-md overflow-hidden text-white bg-cover bg-center"
              style={{
                backgroundImage: `
             linear-gradient(to right, #632EE3, #9F62F2),
             url(${vector2})
           `,
              }}
            >
              <img
                className="absolute left-0 bottom-0 w-1/2"
                src={vector1}
                alt="left vector"
              />
              <img
                className="absolute right-0 bottom-0 w-1/2 scale-x-[-1]"
                src={vector1}
                alt="right vector"
              />
              <div className="relative flex flex-col items-center justify-center h-full">
                <h2 className="text-lg">In-Progress</h2>
                <p className="text-4xl font-bold">{selectedTickets.length}</p>
              </div>
            </div>
            <div
              className="relative w-full h-48 rounded-md overflow-hidden text-white bg-cover bg-center"
              style={{
                backgroundImage: `
             linear-gradient(to right, #54CF68, #00827A),
             url(${vector2})
           `,
              }}
            >
              <img
                className="absolute left-0 bottom-0 w-1/2"
                src={vector1}
                alt="left vector"
              />
              <img
                className="absolute right-0 bottom-0 w-1/2 scale-x-[-1]"
                src={vector1}
                alt="right vector"
              />
              <div className="relative flex flex-col items-center justify-center h-full">
                <h2 className="text-lg">Resolved</h2>
                <p className="text-4xl font-bold">{resolvedTickets.length}</p>
              </div>
            </div>
          </div>
        );
      }

      // banner section end

      // Tickets section start
      function Tickets({ handleSelectTicket, selectedTickets, ticket }) {
        return (
          <div className="w-11/12 mx-auto my-8 gap-4 flex">
            <CustomerTickets
              ticket={ticket}
              handleSelectTicket={handleSelectTicket}
            ></CustomerTickets>
            <SelactatTickets
              resolvedTickets={resolvedTickets}
              handleCompleteTicket={handleCompleteTicket}
              selectedTickets={selectedTickets}></SelactatTickets>
          </div>
        );
      }
      // CustomerTickets section
      function CustomerTickets({ handleSelectTicket, ticket }) {

        return (
          <div className="lg:w-2/3 md:w-2/3">
            <h3 className="text-xl font-bold">Customer Tickets</h3>
            <div className="grid grid-cols-1 gap-5 lg:grid-cols-2 md:grid-cols-2">
              {ticket.map((t) => (
                <Ticke handleSelectTicket={handleSelectTicket} ticket={t}></Ticke>
              ))}
            </div>
          </div>
        );
      }

      // SelactatTickets section
      function SelactatTickets({
        resolvedTickets,
        selectedTickets,
        handleCompleteTicket,
      }) {
        return (
          <div className="lg:w-1/3 md:w-1/3">
            <StatusTask
              selectedTickets={selectedTickets}
              handleCompleteTicket={handleCompleteTicket}
            ></StatusTask>
            <ResolvedTask resolvedTickets={resolvedTickets}></ResolvedTask>
          </div>
        );
      }
      // status task section
      function StatusTask({ handleCompleteTicket, selectedTickets }) {
        return (
          <div>
            <h3 className="font-bold mb-4">
              Selected Tickets ({selectedTickets.length})
            </h3>
            <div className="space-y-3">
              {selectedTickets.map((t, index) => (
                <div key={index} className="p-3 border rounded-lg shadow-sm">
                  <h4 className="text-sm font-bold mb-2">{t.title}</h4>
                  <button
                    onClick={() => handleCompleteTicket(t)}
                    className="btn w-full bg-[#02A53B] text-white text-xs"
                  >
                    Complete
                  </button>
                </div>
              ))}
              {selectedTickets.length === 0 && (
                <p className="text-gray-400 text-sm italic">
                  No tickets selected yet.
                </p>
              )}
            </div>
          </div>
        );
      }
      // Resolved section
      function ResolvedTask({ resolvedTickets }) {
        return (
          <div className="mt-8">
            <h3 className="font-bold mb-4 text-gray-700">Resolved Task</h3>
            <div className="space-y-2">
              {resolvedTickets.map((t, index) => (
                <div
                  key={index}
                  className="p-4 bg-blue-50 rounded-lg font-medium shadow-sm"
                >
                  {t.title}
                </div>
              ))}
              {resolvedTickets.length === 0 && (
                <p className="text-gray-400 italic">No tasks resolved yet.</p>
              )}
            </div>
          </div>
        );
      }

      // ticket section start
      function Ticke({ ticket, handleSelectTicket }) {
        return (
          <div>
            <div
              onClick={() => handleSelectTicket(ticket)}
              className="shadow-md cursor-pointer border p-2 space-y-1 rounded-md"
            >
              <div className="flex justify-between">
                <h1 className="text-md font-bold">{ticket.title}</h1>
                <button>{ticket.status}</button>
              </div>
              <p className="text-xs text-gray-400">{ticket.description}</p>
              <div className="flex justify-between items-center text-xs">
                <h6>{ticket.id}</h6>
                <h4>{ticket.priority}</h4>
                <h5>{ticket.customerName}</h5>
                <span>
                  <i class="fa-regular fa-calendar"></i>
                  {ticket.date}
                </span>
              </div>
            </div>
          </div>
        );
      }

      // Tickets section end

      // footer section start
      function Footer() {
        return (
          <div className="">
            <footer class="footer sm:footer-horizontal bg-black text-gray-300 p-10 grid grid-cols-2 md:grid-cols-1">
              <nav className="">
                <h6 class="footer-title">CS — Ticket System</h6>
                <p>
                  "Empowering your business with a seamless support experience. Our
                  Ticket System ensures every customer query is tracked, managed, and
                  resolved with precision and speed."
                </p>
              </nav>
              <nav>
                <h6 class="footer-title">Company</h6>
                <a class="link link-hover">About Us</a>
                <a class="link link-hover">Our Mission</a>
                <a class="link link-hover">Contact Saled</a>
              </nav>
              <nav>
                <h6 class="footer-title">Services</h6>
                <a class="link link-hover">Products & Services</a>
                <a class="link link-hover">Customer Stories</a>
                <a class="link link-hover">Download Apps</a>
              </nav>
              <nav>
                <h6 class="footer-title">Information</h6>
                <a class="link link-hover">Privacy Policy</a>
                <a class="link link-hover">Terms & Conditions</a>
                <a class="link link-hover">Join Us</a>
              </nav>
              <nav>
                <h6 class="footer-title">Social Links</h6>
                <a class="link link-hover">
                  <i class="fa-brands fa-square-x-twitter"></i>@CS — Ticket System
                </a>
                <a class="link link-hover">
                  <i class="fa-brands fa-linkedin"></i>@CS — Ticket System
                </a>
                <a class="link link-hover">
                  <i class="fa-brands fa-facebook"></i>@CS — Ticket System
                </a>
                <a class="link link-hover">
                  <i class="fa-solid fa-envelope"></i>support@cst.com
                </a>
              </nav>
            </footer>
          </div>
        );
      }

      // footer section end

    };


    ReactDOM.render(<App />, document.getElementById("root"));
  </script>
</body>

</html>
